name: Candidate campaign live proof

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  live-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          npm install --no-package-lock --no-save pdf-lib@1.17.1
      - name: Validate topology model
        run: npm run test:model
      - name: Validate source and confidentiality
        run: npm run test:source
      - name: Validate PDF contracts
        run: npm run test:pdf
      - name: Verify deployed Pages exactly
        run: node scripts/verify-live.mjs https://russelldudek.github.io/highmark/
      # This PR refreshes its merge snapshot after the validated PDF commit reaches main.
