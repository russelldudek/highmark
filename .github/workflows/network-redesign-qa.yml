name: Healthcare network redesign QA

on:
  push:
    branches:
      - redesign/highmark-healthcare-intelligence-network
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-network-redesign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          npm install --no-package-lock --no-save @playwright/test@1.54.1 pdf-lib@1.17.1
          npx playwright install --with-deps chromium
      - name: Validate complete campaign and redesigned network
        run: |
          npm run test:model
          npm run test:source
          npm run test:pdf
          npm run test:network
