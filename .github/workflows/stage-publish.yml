name: Publish Highmark candidate vision

on:
  push:
    branches:
      - 'publish/highmark-ai-value-topology-20260719'
    paths:
      - '.publish/READY'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Assemble public source and brand assets
        run: |
          cat .publish/styles.part.* > styles.css
          mkdir -p assets/brand assets/vendor/three .github/workflows
          base64 --decode .publish/highmark-standalone.b64 > assets/brand/highmark-standalone.png
          base64 --decode .publish/favicon.b64 > assets/brand/favicon.png
          cp .publish/final-publish-assets.yml .github/workflows/publish-assets.yml
          touch .nojekyll
      - name: Vendor pinned Three.js runtime
        run: |
          curl --fail --location --silent --show-error \
            https://unpkg.com/three@0.170.0/build/three.module.min.js \
            --output assets/vendor/three/three.module.min.js
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/mrdoob/three.js/r170/LICENSE \
            --output assets/vendor/three/LICENSE
          echo '08fd7545d13d2c7fb65ab691530a802dafefd638596501854f267d0fb13c39e7  assets/vendor/three/three.module.min.js' | sha256sum --check
          echo '4c40a1ef62450b857c3b2aaf294936304cd552d965fbcd9d32d4c5bcf4ba4454  assets/vendor/three/LICENSE' | sha256sum --check
      - name: Install build and PDF validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          npm install --no-package-lock --no-save @playwright/test@1.54.1 pdf-lib@1.17.1
          npx playwright install --with-deps chromium
      - name: Generate and validate the complete campaign
        run: |
          npm run test:model
          npm run build:pdf
          npm run test:source
          npm run test:pdf
      - name: Publish one clean commit to main
        run: |
          rm -rf .publish node_modules .github/workflows/stage-publish.yml
          git fetch origin main
          BASE=$(git rev-parse origin/main)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          TREE=$(git write-tree)
          COMMIT=$(printf '%s\n' 'Publish Highmark AI value topology candidate vision' | git commit-tree "$TREE" -p "$BASE")
          git push origin "$COMMIT:refs/heads/main"
          echo "Published main commit: $COMMIT"
