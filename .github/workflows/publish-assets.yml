name: Build, validate, and deploy candidate campaign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: highmark-candidate-campaign-pages
  cancel-in-progress: false

jobs:
  build-validate-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install build and validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          npm install --no-package-lock --no-save @playwright/test@1.54.1 pdf-lib@1.17.1
          npx playwright install --with-deps chromium
      - name: Generate and validate campaign artifacts
        run: |
          npm run test:model
          npm run build:pdf
          npm run test:source
          npm run test:pdf
          npm run test:review
      - name: Commit regenerated PDFs when needed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs
          if git diff --cached --quiet; then
            echo 'Committed PDFs already match the HTML print source.'
          else
            git commit -m 'Refresh validated campaign PDFs [skip ci]'
            git push
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload candidate campaign
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy candidate campaign
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify deployed routes and downloads
        run: node scripts/verify-live.mjs "${{ steps.deployment.outputs.page_url }}"
